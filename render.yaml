services:
  - type: web
    name: textile-maintenance-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: textile-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: textile-db
    databaseName: textile_maintenance
    user: admin
    plan: free
