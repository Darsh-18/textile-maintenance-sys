version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: textile_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: textile_maintenance
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    container_name: textile_backend
    restart: always
    environment:
      # Tell FastAPI to connect to the Docker Postgres instance
      DATABASE_URL: postgresql+psycopg://postgres:password@db/textile_maintenance
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend
    container_name: textile_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
